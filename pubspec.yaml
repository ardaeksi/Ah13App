name: ascent
description: "Level up your game with our dynamic app, offering engaging challenges, a competitive leaderboard, and exclusive access to real-world soccer tournaments, all secured with seamless login and registration."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  crypto: ^3.0.0
  cloud_firestore: '>=5.5.0'
  firebase_auth: '>=5.3.3'
  firebase_core: ^4.5.0
  shared_preferences: ^2.0.0
  font_awesome_flutter: ^10.0.0
  fl_chart: 0.68.0
  flutter_animate: ^4.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
